name: Update Global Satellite Signal Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Sirf latest commit fetch karega (Memory bachaane ke liye)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Dependencies ko cache karega taaki build fast ho

      - name: Clean old assets
        run: |
          rm -rf assets/* # Purani saari files delete kar dega naye run se pehle
          mkdir -p assets

      - name: Run dashboard script
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: |
          python update_readme.py

      - name: Commit and Force Push (History Cleanup)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Check if there are changes
          git add README.md assets/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Purani history ko overwrite karne ke liye (Optional but helps in keeping repo small)
          git commit --amend -m "Live Update: $(date -u '+%Y-%m-%d %H:%M UTC')" || git commit -m "Live Update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force