name: Update Global Satellite Signal Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create assets directory
        run: mkdir -p assets

      - name: Run dashboard script
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: |
          python update_readme.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git add assets/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push